<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BABYLON - 신앙의 여정</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { background-color: #1e1512; }
    .font-medieval { font-family: 'Cinzel', 'Noto Serif KR', serif; }
    
    .wood-bg { background: linear-gradient(135deg, #1e1512 0%, #0d0705 100%); }
    .parchment-panel { background: linear-gradient(to bottom right, #2f221a, #1f140e); }
    
    .gold-text { background: linear-gradient(to bottom, #fada5e, #d4af37, #996515); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .wax-seal { background: radial-gradient(circle at 30% 30%, #b71c1c, #7f0000); box-shadow: inset 0 0 10px rgba(0,0,0,0.7), 0 4px 6px rgba(0,0,0,0.8); }
    .stone-slot { background: #140b08; box-shadow: inset 0 4px 8px rgba(0,0,0,0.9), 0 1px 1px rgba(255,255,255,0.05); border: 2px solid #3e2723; }
    
    .medieval-btn { background: linear-gradient(to bottom, #4e342e, #2b1b17); border: 2px solid #795548; box-shadow: 0 4px 6px rgba(0,0,0,0.6), inset 0 1px 1px rgba(255,255,255,0.05); color: #e6d5c3; transition: all 0.2s; }
    .medieval-btn:hover { background: linear-gradient(to bottom, #5d4037, #3e2723); border-color: #8d6e63; }
    .medieval-btn:active { background: #2b1b17; box-shadow: inset 0 4px 6px rgba(0,0,0,0.8); transform: translateY(2px); }
    
    .gold-btn { background: linear-gradient(to bottom, #d4af37, #aa8000); border: 2px solid #ffe066; color: #1a110c; text-shadow: 0 1px 1px rgba(255,255,255,0.3); box-shadow: 0 4px 8px rgba(0,0,0,0.7); transition: all 0.2s; }
    .gold-btn:hover { background: linear-gradient(to bottom, #e5c158, #b8860b); }
    .gold-btn:active { background: #996515; transform: translateY(2px); box-shadow: inset 0 4px 6px rgba(0,0,0,0.8); }
    
    .blood-btn { background: linear-gradient(to bottom, #990000, #5c0000); border: 2px solid #ff5252; color: #ffebee; box-shadow: 0 4px 8px rgba(0,0,0,0.7); transition: all 0.2s; }
    .blood-btn:hover { background: linear-gradient(to bottom, #b71c1c, #7f0000); }
    .blood-btn:active { background: #5c0000; transform: translateY(2px); box-shadow: inset 0 4px 6px rgba(0,0,0,0.8); }
    
    .royal-btn { background: linear-gradient(to bottom, #1565c0, #0d47a1); border: 2px solid #82b1ff; color: #e3f2fd; box-shadow: 0 4px 8px rgba(0,0,0,0.7); transition: all 0.2s; }
    .royal-btn:hover { background: linear-gradient(to bottom, #1976d2, #1565c0); }
    .royal-btn:active { background: #0a3a82; transform: translateY(2px); box-shadow: inset 0 4px 6px rgba(0,0,0,0.8); }
    
    .medieval-input { background: rgba(0,0,0,0.6); border: 2px solid #4e342e; color: #f5deb3; }
    .medieval-input:focus { border-color: #d4af37; outline: none; box-shadow: 0 0 10px rgba(212,175,55,0.3); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
    @keyframes pulse-fast { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse-fast { animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body class="min-h-screen wood-bg text-[#e6d5c3] font-medieval overflow-x-hidden flex justify-center">

  <div id="app" class="w-full max-w-md relative pt-12 p-4 sm:p-6 pb-20"></div>

  <script>
    // --- 게임 설정 상수 ---
    const MIN_PLAYERS = 5;
    const MAX_PLAYERS = 10;

    const GOOD_ROLES_ORDER = [
      { roleId: 'moses', characterName: '모세', role: '멀린', desc: '느부갓네살을 제외한 악 진영이 누구인지 알고 있습니다. (단, 누가 어떤 역할을 맡았는지는 모릅니다)', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20biblical%20Moses%20parting%20the%20sea?width=400&height=400&nologo=true&seed=1' },
      { roleId: 'daniel', characterName: '다니엘', role: '퍼시벌', desc: '모세와 이세벨의 정체를 알지만, 둘 중 누가 진짜 모세인지는 모릅니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20biblical%20Daniel%20in%20lion%20den?width=400&height=400&nologo=true&seed=2' },
      { roleId: 'esther', characterName: '에스더', role: '충신', desc: '특별한 능력은 없지만, 선 진영의 승리를 위해 헌신합니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20biblical%20Queen%20Esther%20beautiful?width=400&height=400&nologo=true&seed=3' },
      { roleId: 'jacob', characterName: '야곱', role: '충신', desc: '특별한 능력은 없지만, 선 진영의 승리를 위해 헌신합니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20biblical%20Jacob%20wrestling%20angel?width=400&height=400&nologo=true&seed=4' },
      { roleId: 'noah', characterName: '노아', role: '충신', desc: '특별한 능력은 없지만, 선 진영의 승리를 위해 헌신합니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20biblical%20Noah%20and%20ark?width=400&height=400&nologo=true&seed=5' },
      { roleId: 'abraham', characterName: '아브라함', role: '충신', desc: '특별한 능력은 없지만, 선 진영의 승리를 위해 헌신합니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20biblical%20patriarch%20Abraham%20looking%20at%20stars?width=400&height=400&nologo=true&seed=6' }
    ];

    const EVIL_ROLES_ORDER = [
      { roleId: 'herod', characterName: '헤롯', role: '암살자', desc: '악 진영 동료들의 정체와 역할을 모두 압니다. 게임 패배 시, 모세를 찾아내어 암살하면 역전승합니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20evil%20King%20Herod%20angry?width=400&height=400&nologo=true&seed=7' },
      { roleId: 'jezebel', characterName: '이세벨', role: '모르가나', desc: '악 진영 동료들의 정체와 역할을 모두 압니다. 다니엘에게 모세처럼 보입니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20wicked%20Queen%20Jezebel?width=400&height=400&nologo=true&seed=8' },
      { roleId: 'nebuchadnezzar', characterName: '느부갓네살', role: '모드레드', desc: '악 진영 동료들의 정체와 역할을 모두 압니다. 모세에게 자신의 정체를 숨깁니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20King%20Nebuchadnezzar%20babylon?width=400&height=400&nologo=true&seed=9' },
      { roleId: 'pharaoh', characterName: '바로', role: '오베론', desc: '악 진영 동료들의 정체와 역할을 모두 압니다.', img: 'https://image.pollinations.ai/prompt/classical%20oil%20painting%20of%20Egyptian%20Pharaoh%20exodus?width=400&height=400&nologo=true&seed=10' }
    ];

    const ROLE_COUNTS = {
      5: [3, 2], 6: [4, 2], 7: [4, 3], 8: [5, 3], 9: [6, 3], 10: [6, 4]
    };

    const QUEST_SIZES = {
      5: [2, 3, 2, 3, 3], 6: [2, 3, 4, 3, 4], 7: [2, 3, 3, 4, 4],
      8: [3, 4, 4, 5, 5], 9: [3, 4, 4, 5, 5], 10: [3, 4, 4, 5, 5]
    };

    const shuffle = (array) => {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    };

    // --- 상태 관리 변수 ---
    let state = {
      gameState: 'setup', 
      players: [],
      currentPlayerIndex: 0,
      showSecret: false,
      leaderIndex: 0,
      currentRound: 0,
      rejectCount: 0,
      selectedTeam: [],
      votes: {},
      questCards: [],
      history: [],
      winner: null,
      winReason: '',
      assassinationTarget: null,
      timeLeft: null,
      showConfirm: false
    };

    let timerInterval = null;

    // --- 타이머 제어 ---
    function setTimer(seconds) {
      clearInterval(timerInterval);
      state.timeLeft = seconds;
      
      if (seconds === null) return;
      
      timerInterval = setInterval(() => {
        state.timeLeft--;
        if (state.timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeout();
        } else {
          updateTimerUI();
        }
      }, 1000);
    }

    function updateTimerUI() {
      const containerEl = document.getElementById('timer-container');
      const textEl = document.getElementById('timer-text');
      
      if (!containerEl || !textEl) return;

      const mins = Math.floor(state.timeLeft / 60);
      const secs = state.timeLeft % 60;
      const isUrgent = state.timeLeft <= 5;
      
      textEl.innerText = mins > 0 ? `${mins}:${secs.toString().padStart(2, '0')}` : secs;
      
      if (isUrgent) {
        containerEl.className = 'fixed top-4 left-4 px-5 py-2 rounded-sm border-2 font-extrabold text-2xl shadow-2xl z-50 transition-colors flex items-center gap-2 blood-btn animate-pulse-fast text-white';
        const svgEl = containerEl.querySelector('svg');
        if (svgEl) {
          svgEl.classList.remove('text-[#d4af37]');
          svgEl.classList.add('text-white');
        }
      } else {
        containerEl.className = 'fixed top-4 left-4 px-5 py-2 rounded-sm border-2 font-extrabold text-2xl shadow-2xl z-50 transition-colors flex items-center gap-2 bg-[#140b08] border-[#8b6b4a] gold-text';
        const svgEl = containerEl.querySelector('svg');
        if (svgEl) {
          svgEl.classList.remove('text-white');
          svgEl.classList.add('text-[#d4af37]');
        }
      }
    }

    function handleTimeout() {
      state.timeLeft = null;
      if (state.gameState === 'reveal' && state.showSecret) {
        state.showSecret = false;
      } else if (state.gameState === 'select_team') {
        state.rejectCount++;
        if (state.rejectCount >= 5) {
          endGame('evil', '5연속 신앙여정대 파견 부결(시간초과 포함)로 인한 악 진영 승리!');
        } else {
          state.leaderIndex = (state.leaderIndex + 1) % state.players.length;
          state.selectedTeam = [];
          state.gameState = 'pre_discussion'; // 부결 시 사전 토론으로 이동
          setTimer(120);
        }
      } else if (state.gameState === 'pre_discussion') {
        state.gameState = 'board';
      } else if (state.gameState === 'discussion') {
        state.gameState = 'voting';
        state.votes = {};
        state.currentPlayerIndex = 0;
        state.showSecret = false;
      } else if (state.gameState === 'voting' && state.showSecret) {
        handleVote('reject');
      } else if (state.gameState === 'quest' && state.showSecret) {
        handleQuestCard('success');
      } else if (state.gameState === 'evil_discussion') {
        state.gameState = 'assassination';
        setTimer(20);
      } else if (state.gameState === 'assassination') {
        endGame('good', '헤롯이 시간 내에 모세를 지목하지 못했습니다. 선 진영 승리!');
      }
      render();
    }

    // --- 액션 핸들러 ---
    function handleAddPlayer(e) {
      e.preventDefault();
      const input = document.getElementById('playerNameInput');
      const name = input.value.trim();
      if (name && state.players.length < MAX_PLAYERS && !state.players.find(p => p.name === name)) {
        state.players.push({ name });
        input.value = '';
        render();
      }
    }

    function handleRemovePlayer(index) {
      state.players.splice(index, 1);
      render();
    }

    function startGame() {
      if (state.players.length < MIN_PLAYERS) return;
      
      const pCount = state.players.length;
      const [goodCount, evilCount] = ROLE_COUNTS[pCount];
      
      const goodRoles = GOOD_ROLES_ORDER.slice(0, goodCount).map(r => ({ ...r, team: 'good' }));
      const evilRoles = EVIL_ROLES_ORDER.slice(0, evilCount).map(r => ({ ...r, team: 'evil' }));
      
      const allRoles = shuffle([...goodRoles, ...evilRoles]);
      state.players = shuffle(state.players).map((p, i) => ({
        id: i, name: p.name, ...allRoles[i]
      }));

      // 역할을 확인할 때 지연이 없도록 백그라운드에서 이미지를 미리 로드합니다.
      state.players.forEach(p => {
        if (p.img) {
          const img = new Image();
          img.src = p.img;
        }
      });

      state.leaderIndex = Math.floor(Math.random() * pCount);
      state.gameState = 'reveal';
      state.currentPlayerIndex = 0;
      state.showSecret = false;
      render();
    }

    function getKnowledge(player) {
      if (player.roleId === 'moses') {
        const knownEvils = state.players.filter(p => p.team === 'evil' && p.roleId !== 'nebuchadnezzar').map(p => p.name);
        return knownEvils.length > 0 ? `악 진영 (느부갓네살 제외): ${knownEvils.join(', ')}` : '알려진 악 진영이 없습니다.';
      }
      if (player.roleId === 'daniel') {
        let targets = state.players.filter(p => p.roleId === 'moses' || p.roleId === 'jezebel').map(p => p.name);
        return `모세 혹은 이세벨: ${shuffle(targets).join(', ')}`;
      }
      if (player.team === 'evil') {
        const evils = state.players.filter(p => p.team === 'evil' && p.roleId !== player.roleId).map(p => `${p.name} (${p.characterName})`);
        return evils.length > 0 ? `악 진영 동료: ${evils.join(', ')}` : '당신 외에 악 진영 동료가 없습니다.';
      }
      return '특별히 알고 있는 정보가 없습니다.';
    }

    function nextReveal() {
      setTimer(null);
      if (state.currentPlayerIndex < state.players.length - 1) {
        state.currentPlayerIndex++;
        state.showSecret = false;
      } else {
        state.gameState = 'board';
      }
      render();
    }

    function togglePlayerSelection(playerId) {
      const reqPlayers = QUEST_SIZES[state.players.length][state.currentRound];
      const idx = state.selectedTeam.indexOf(playerId);
      if (idx > -1) {
        state.selectedTeam.splice(idx, 1);
      } else if (state.selectedTeam.length < reqPlayers) {
        state.selectedTeam.push(playerId);
      }
      render();
    }

    function confirmTeam() {
      const reqPlayers = QUEST_SIZES[state.players.length][state.currentRound];
      if (state.selectedTeam.length === reqPlayers) {
        if (state.currentRound === 0) {
          // 1라운드는 지목 후 토론 진행
          setTimer(120);
          state.gameState = 'discussion';
        } else {
          // 2라운드부터는 (이미 사전 토론을 했으므로) 지목 후 바로 투표 진행
          setTimer(null);
          state.gameState = 'voting';
          state.votes = {};
          state.currentPlayerIndex = 0;
          state.showSecret = false;
        }
        render();
      }
    }

    function handleVote(voteType) {
      setTimer(null);
      const player = state.players[state.currentPlayerIndex];
      state.votes[player.name] = voteType;
      
      if (state.currentPlayerIndex < state.players.length - 1) {
        state.currentPlayerIndex++;
        state.showSecret = false;
      } else {
        const approveCount = Object.values(state.votes).filter(v => v === 'approve').length;
        if (approveCount > state.players.length / 2) {
          state.gameState = 'quest';
          state.questCards = [];
          state.currentPlayerIndex = 0;
          state.showSecret = false;
        } else {
          state.rejectCount++;
          if (state.rejectCount >= 5) {
            endGame('evil', '5연속 신앙여정대 파견 부결로 인한 악 진영 승리!');
          } else {
            state.leaderIndex = (state.leaderIndex + 1) % state.players.length;
            state.selectedTeam = [];
            state.gameState = 'pre_discussion'; // 부결 시 새 대장을 확인하며 사전 토론
            setTimer(120);
          }
        }
      }
      render();
    }

    function handleQuestCard(cardType) {
      setTimer(null);
      state.questCards.push(cardType);
      
      if (state.questCards.length < state.selectedTeam.length) {
        state.currentPlayerIndex++;
        state.showSecret = false;
      } else {
        const failCount = state.questCards.filter(c => c === 'fail').length;
        const needsTwoFails = state.players.length >= 7 && state.currentRound === 3;
        const resultStatus = (needsTwoFails ? failCount >= 2 : failCount >= 1) ? 'fail' : 'success';

        state.history.push({
          round: state.currentRound,
          team: [...state.selectedTeam],
          votes: { ...state.votes },
          cards: shuffle([...state.questCards]),
          result: resultStatus,
          fails: failCount
        });
        
        state.gameState = 'quest_result';
      }
      render();
    }

    function proceedFromQuestResult() {
      const goodWins = state.history.filter(h => h.result === 'success').length;
      const evilWins = state.history.filter(h => h.result === 'fail').length;

      if (goodWins >= 3) {
        state.gameState = 'evil_discussion';
        setTimer(60);
      } else if (evilWins >= 3) {
        endGame('evil', '신앙여정 3회 실패로 악 진영 승리!');
      } else {
        state.currentRound++;
        state.rejectCount = 0;
        state.leaderIndex = (state.leaderIndex + 1) % state.players.length;
        state.selectedTeam = [];
        state.gameState = 'pre_discussion'; // 새로운 라운드 시작 시 사전 토론
        setTimer(120);
      }
      render();
    }

    function handleAssassination(targetId) {
      setTimer(null);
      const targetPlayer = state.players.find(p => p.id === targetId);
      if (targetPlayer.roleId === 'moses') {
        endGame('evil', `헤롯이 모세(${targetPlayer.name})를 정확히 암살하여 악 진영 역전승!`);
      } else {
        endGame('good', `헤롯이 모세 암살에 실패했습니다. (지목: ${targetPlayer.name}) 선 진영 승리!`);
      }
      render();
    }

    function endGame(winTeam, reason) {
      setTimer(null);
      state.winner = winTeam;
      state.winReason = reason;
      state.gameState = 'end';
      render();
    }

    function resetGame() {
      clearInterval(timerInterval);
      state = {
        ...state,
        gameState: 'setup',
        currentRound: 0,
        rejectCount: 0,
        history: [],
        winner: null,
        assassinationTarget: null,
        timeLeft: null,
        showConfirm: false,
        players: state.players.map(p => ({ name: p.name }))
      };
      render();
    }

    // --- HTML 렌더링 도우미 ---
    const getCommonUI = () => {
      let html = '';
      if (state.gameState !== 'setup' && state.gameState !== 'end') {
        html += `
          <button onclick="state.showConfirm=true; render()" class="fixed top-4 right-4 p-2 bg-[#140b08] border-2 border-[#8b6b4a] text-[#d4af37] rounded-sm shadow-2xl z-50 hover:bg-[#2b1b17] hover:text-[#ff5252] hover:border-[#ff5252] transition-colors" title="게임 리셋">
            <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
          </button>
        `;
      }

      if (state.timeLeft !== null) {
        const mins = Math.floor(state.timeLeft / 60);
        const secs = state.timeLeft % 60;
        const isUrgent = state.timeLeft <= 5;
        const timerClass = isUrgent ? 'blood-btn animate-pulse-fast text-white' : 'bg-[#140b08] border-[#8b6b4a] gold-text';
        html += `
          <div id="timer-container" class="fixed top-4 left-4 px-5 py-2 rounded-sm border-2 font-extrabold text-2xl shadow-2xl z-50 transition-colors flex items-center gap-2 ${timerClass}">
            <i id="timer-icon" data-lucide="clock" class="w-6 h-6 ${isUrgent ? 'text-white' : 'text-[#d4af37]'}"></i>
            <span id="timer-text">${mins > 0 ? `${mins}:${secs.toString().padStart(2, '0')}` : secs}</span>
          </div>
        `;
      }

      if (state.showConfirm) {
        html += `
          <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] px-4 animate-fadeIn">
            <div class="parchment-panel border-[4px] border-double border-[#8b6b4a] p-6 rounded-sm shadow-2xl text-center max-w-sm w-full">
              <i data-lucide="alert-triangle" class="w-12 h-12 text-[#ff5252] mx-auto mb-4"></i>
              <h3 class="text-2xl font-bold gold-text mb-2">게임 리셋</h3>
              <p class="text-[#d7ccc8] mb-8 font-medium">진행 중인 게임을 취소하고<br/>처음으로 돌아가시겠습니까?</p>
              <div class="flex gap-4">
                <button onclick="resetGame()" class="flex-1 py-3 blood-btn font-bold text-lg rounded-sm">네, 리셋합니다</button>
                <button onclick="state.showConfirm=false; render()" class="flex-1 py-3 medieval-btn font-bold text-lg rounded-sm">아니오</button>
              </div>
            </div>
          </div>
        `;
      }
      return html;
    };

    const getTitleHTML = () => `
      <div class="text-center mb-8 relative">
        <h1 class="text-5xl font-extrabold font-medieval gold-text tracking-widest drop-shadow-[0_4px_6px_rgba(0,0,0,0.8)] mb-2 uppercase">BABYLON</h1>
        <h2 class="text-lg text-[#bcaaa4] font-medieval uppercase tracking-widest border-b border-[#5d4037] pb-2 inline-block">신앙의 여정</h2>
      </div>
    `;

    // --- 메인 렌더링 함수 ---
    function render() {
      const app = document.getElementById('app');
      let content = getCommonUI();

      if (state.gameState === 'setup') {
        content += getTitleHTML() + `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-6 rounded-sm shadow-[0_15px_35px_rgba(0,0,0,0.8)]">
            <h3 class="text-2xl font-bold mb-6 text-center gold-text uppercase">참가자 명부 (${state.players.length}/${MAX_PLAYERS})</h3>
            <form onsubmit="handleAddPlayer(event)" class="flex gap-2 mb-6">
              <input type="text" id="playerNameInput" placeholder="참가자 이름 입력" class="flex-1 medieval-input px-4 py-2 text-base font-bold min-w-0" maxlength="10">
              <button type="submit" class="px-5 py-2 medieval-btn font-bold text-base whitespace-nowrap shrink-0">추가</button>
            </form>
            <ul class="space-y-2 mb-8 min-h-[160px]">
              ${state.players.map((p, idx) => `
                <li class="flex justify-between items-center bg-[#140b08]/80 border border-[#4e342e] px-4 py-3 rounded-sm shadow-inner">
                  <span class="font-bold text-lg text-[#f5deb3]">${p.name}</span>
                  <button onclick="handleRemovePlayer(${idx})" class="text-[#d32f2f] hover:text-[#ff5252]">
                    <i data-lucide="x-circle" class="w-6 h-6"></i>
                  </button>
                </li>
              `).join('')}
              ${state.players.length === 0 ? `<p class="text-[#8d6e63] text-center py-6 font-bold">최소 5명의 용사가 필요합니다.</p>` : ''}
            </ul>
            <button onclick="startGame()" ${state.players.length < MIN_PLAYERS ? 'disabled' : ''} class="w-full py-4 text-xl font-bold tracking-wider ${state.players.length >= MIN_PLAYERS ? 'gold-btn' : 'medieval-btn opacity-50 cursor-not-allowed'}">
              ${state.players.length < MIN_PLAYERS ? `${MIN_PLAYERS}명 이상 필요` : '역할 배분 시작'}
            </button>
          </div>
        `;
      } 
      else if (state.gameState === 'reveal') {
        const player = state.players[state.currentPlayerIndex];
        const isGood = player.team === 'good';
        
        content += getTitleHTML() + `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-6 rounded-sm shadow-[0_15px_35px_rgba(0,0,0,0.8)] text-center min-h-[500px] flex flex-col">
            <h3 class="text-2xl font-bold mb-3 gold-text">비밀 역할 서신</h3>
            <p class="text-[#bcaaa4] mb-4 font-medium">기기를 전달하고 자신의 역할을 확인하세요.</p>
            <div class="flex-1 flex flex-col justify-center items-center">
              ${!state.showSecret ? `
                <div class="w-full flex flex-col items-center mt-6">
                  <div class="w-24 h-24 stone-slot rounded-full flex items-center justify-center mb-6">
                    <i data-lucide="users" class="w-12 h-12 text-[#8d6e63]"></i>
                  </div>
                  <h4 class="text-4xl font-extrabold text-[#f5deb3] mb-8 drop-shadow-md">${player.name}</h4>
                  <button onclick="state.showSecret=true; setTimer(10); render();" class="w-full py-4 medieval-btn font-bold text-xl flex items-center justify-center gap-3">
                    <i data-lucide="eye" class="w-6 h-6"></i> 역할 확인 (10초)
                  </button>
                </div>
              ` : `
                <div class="w-full flex flex-col items-center animate-fadeIn">
                  
                  <!-- 명화 이미지 영역 -->
                  <div class="relative w-36 h-36 mx-auto mb-4 border-[4px] border-[#8b6b4a] rounded-sm shadow-[0_5px_15px_rgba(0,0,0,0.9)] overflow-hidden bg-[#140b08]">
                    <div class="absolute inset-0 flex items-center justify-center">
                      <i data-lucide="image" class="w-8 h-8 text-[#5d4037] animate-pulse"></i>
                    </div>
                    <img src="${player.img}" alt="${player.characterName}" class="relative z-10 w-full h-full object-cover transition-opacity duration-500" onload="this.style.opacity=1" style="opacity: 0; filter: sepia(0.4) contrast(1.1) brightness(0.9);">
                    <div class="absolute inset-0 z-20 ring-inset ring-[4px] ring-black/40 pointer-events-none"></div>
                  </div>

                  <div class="text-sm px-4 py-1 rounded-sm mb-2 font-bold border-2 ${isGood ? 'bg-[#0d47a1]/40 text-[#82b1ff] border-[#1565c0]' : 'bg-[#7f0000]/40 text-[#ff8a80] border-[#b71c1c]'}">
                    ${isGood ? '선 진영 (빛의 자녀들)' : '악 진영 (어둠의 권세)'}
                  </div>
                  
                  <h4 class="text-3xl font-extrabold mb-1 text-[#f5deb3]">${player.name}</h4>
                  <h5 class="text-xl font-bold mb-3 drop-shadow-md ${isGood ? 'text-[#64b5f6]' : 'text-[#ff5252]'}">${player.characterName} <span class="opacity-80 text-base">(${player.role})</span></h5>
                  
                  <p class="text-[#d7ccc8] text-sm mb-4 leading-relaxed stone-slot px-4 py-3 rounded-sm font-medium">"${player.desc}"</p>
                  
                  <div class="w-full bg-[#140b08]/80 p-4 rounded-sm border border-[#5d4037] text-left mb-6 shadow-inner">
                    <span class="block text-sm gold-text mb-2 font-bold uppercase">알려진 진실:</span>
                    <span class="text-[#f5deb3] font-medium leading-relaxed">${getKnowledge(player)}</span>
                  </div>
                  
                  <button onclick="nextReveal()" class="w-full py-4 gold-btn font-bold text-xl flex items-center justify-center gap-3">
                    ${state.currentPlayerIndex < state.players.length - 1 ? '다음 사람에게 전달' : '모두 확인 완료'} 
                    <i data-lucide="eye-off" class="w-6 h-6"></i>
                  </button>
                </div>
              `}
            </div>
          </div>
        `;
      }
      else if (state.gameState === 'pre_discussion') {
        const currentLeader = state.players[state.leaderIndex];
        content += `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-8 rounded-sm shadow-2xl text-center flex flex-col justify-center min-h-[450px]">
            <i data-lucide="message-circle" class="w-16 h-16 text-[#d4af37] mx-auto mb-4 drop-shadow-lg"></i>
            <h2 class="text-3xl font-extrabold gold-text mb-2">여정대 지목 전 토론</h2>
            
            <div class="my-6">
              <h3 class="text-xl text-[#bcaaa4] mb-2 font-bold">이번 신앙여정 대장</h3>
              <div class="flex items-center justify-center gap-3">
                <i data-lucide="crown" class="w-8 h-8 text-[#d4af37] drop-shadow-md"></i>
                <p class="text-4xl font-extrabold text-[#f5deb3] drop-shadow-md">${currentLeader.name}</p>
              </div>
            </div>

            <p class="text-[#d7ccc8] mb-8 font-medium text-lg leading-relaxed">대장이 여정대를 지목하기 전입니다.<br/>누구를 보낼지, 혹은 보내지 말아야 할지 자유롭게 토론하세요.</p>
            <button onclick="state.gameState='board'; setTimer(null); render();" class="w-full py-4 royal-btn font-bold text-xl">토론 종료 (여정대 지목하기)</button>
          </div>
        `;
      }
      else if (state.gameState === 'discussion') {
        const currentLeader = state.players[state.leaderIndex];
        content += `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-8 rounded-sm shadow-2xl text-center flex flex-col justify-center min-h-[450px]">
            <i data-lucide="message-circle" class="w-16 h-16 text-[#d4af37] mx-auto mb-4 drop-shadow-lg"></i>
            <h2 class="text-3xl font-extrabold gold-text mb-2">여정대 지목 후 토론</h2>
            
            <div class="my-4">
              <div class="flex items-center justify-center gap-2 mb-2">
                <i data-lucide="crown" class="w-6 h-6 text-[#d4af37]"></i>
                <span class="text-2xl font-extrabold text-[#f5deb3]">${currentLeader.name}</span>
                <span class="text-[#bcaaa4] font-medium">대장의 선택</span>
              </div>
            </div>
            
            <div class="stone-slot p-5 rounded-sm mb-8 border-[#5d4037]">
              <span class="text-sm text-[#8d6e63] font-bold block mb-3 uppercase tracking-widest">지목된 여정대</span>
              <div class="flex flex-wrap justify-center gap-3">
                ${state.selectedTeam.map(id => `
                  <span class="bg-[#3e2723] border border-[#d4af37] px-4 py-1.5 rounded-sm text-[#ffe066] font-bold shadow-[0_0_10px_rgba(212,175,55,0.2)]">
                    ${state.players.find(p=>p.id === id).name}
                  </span>
                `).join('')}
              </div>
            </div>

            <p class="text-[#d7ccc8] mb-6 font-medium">이 구성에 대해 자유롭게 토론한 후 투표를 진행합니다.</p>
            <button onclick="state.gameState='voting'; state.votes={}; state.currentPlayerIndex=0; state.showSecret=false; setTimer(null); render();" class="w-full py-4 royal-btn font-bold text-xl">토론 종료 및 투표 시작</button>
          </div>
        `;
      }
      else if (state.gameState === 'board' || state.gameState === 'select_team') {
        const currentLeader = state.players[state.leaderIndex];
        const reqPlayers = QUEST_SIZES[state.players.length][state.currentRound];
        
        content += `
          <div class="flex justify-between items-end mb-6 border-b-2 border-[#5d4037] pb-2">
            <h1 class="text-4xl font-extrabold gold-text font-medieval tracking-widest drop-shadow-md">BABYLON</h1>
            <span class="text-[#d4af37] font-bold bg-[#2b1b17] px-4 py-1.5 rounded-sm border-2 border-[#5d4037] shadow-lg">라운드 ${state.currentRound + 1}/5</span>
          </div>
          
          <div class="flex justify-between items-center parchment-panel p-5 rounded-sm shadow-[0_10px_20px_rgba(0,0,0,0.8)] border-[4px] border-double border-[#8b6b4a] mb-6 relative">
            ${QUEST_SIZES[state.players.length].map((size, idx) => {
              const isCurrent = idx === state.currentRound;
              const pastResult = state.history[idx];
              let circleClass = "w-14 h-14 flex items-center justify-center font-bold text-xl transition-all rounded-full ";
              let innerHTML = size;
              
              if (pastResult) {
                circleClass += pastResult.result === 'success' ? 'royal-btn' : 'wax-seal border-2 border-[#ff8a80] text-red-100';
                innerHTML = pastResult.result === 'success' ? '<i data-lucide="shield"></i>' : '<i data-lucide="sword"></i>';
              } else if (isCurrent) {
                circleClass += 'gold-btn scale-110 shadow-[0_0_20px_rgba(212,175,55,0.6)] z-10';
              } else {
                circleClass += 'stone-slot text-[#8d6e63]';
              }

              return `
                <div class="flex flex-col items-center relative z-10">
                  <div class="${circleClass}">${innerHTML}</div>
                  ${(state.players.length >= 7 && idx === 3) ? '<span class="absolute -bottom-6 text-[11px] text-[#ff5252] font-bold whitespace-nowrap bg-[#140b08] px-1 border border-[#ff5252] rounded-sm">2실패 필요</span>' : ''}
                </div>
              `;
            }).join('')}
          </div>

          <div class="bg-[#140b08]/90 p-4 rounded-sm shadow-lg border-2 border-[#4e342e] mb-6">
            <div class="flex justify-between items-center mb-3">
              <span class="text-[#bcaaa4] font-bold uppercase tracking-wider">부결 트랙 <span class="text-xs normal-case">(5회 시 악 승리)</span></span>
              <span class="text-[#ff5252] font-extrabold text-lg">${state.rejectCount} / 5</span>
            </div>
            <div class="flex gap-2 h-4">
              ${[1,2,3,4,5].map(i => `<div class="flex-1 rounded-sm border border-[#140b08] shadow-inner ${i <= state.rejectCount ? 'bg-[#b71c1c] shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'bg-[#2b1b17]'}"></div>`).join('')}
            </div>
          </div>

          <div class="parchment-panel p-6 rounded-sm shadow-[0_15px_35px_rgba(0,0,0,0.9)] border-[6px] border-double border-[#8b6b4a] relative overflow-hidden">
            ${state.gameState === 'board' ? `
              <div class="text-center py-6">
                <i data-lucide="crown" class="w-14 h-14 text-[#d4af37] mx-auto mb-4 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)]"></i>
                <h3 class="text-xl text-[#bcaaa4] mb-2 font-bold">이번 신앙여정 대장</h3>
                <p class="text-4xl font-extrabold text-[#f5deb3] mb-8 drop-shadow-md">${currentLeader.name}</p>
                <button onclick="state.gameState='select_team'; setTimer(20); render();" class="w-full py-4 gold-btn font-bold text-xl">여정대 지목하기 (20초)</button>
              </div>
            ` : `
              <div>
                <div class="mb-6 text-center border-b border-[#5d4037] pb-4">
                  <h3 class="text-2xl font-bold gold-text mb-2">여정대 지목</h3>
                  <p class="text-[#d7ccc8] font-medium">대장 <strong class="text-[#f5deb3] text-lg">${currentLeader.name}</strong> 님, ${reqPlayers}명을 지목하세요.</p>
                  <p class="text-[#d4af37] font-extrabold mt-2 text-lg">선택됨: ${state.selectedTeam.length} / ${reqPlayers}</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-8">
                  ${state.players.map(p => {
                    const isSelected = state.selectedTeam.includes(p.id);
                    const isLeader = p.id === currentLeader.id;
                    return `
                      <button onclick="togglePlayerSelection(${p.id})" class="relative p-4 rounded-sm text-left transition-all font-bold text-xl ${isSelected ? 'bg-[#3e2723] border-2 border-[#d4af37] text-[#ffe066] shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'medieval-btn opacity-90'}">
                        ${isLeader ? '<i data-lucide="crown" class="absolute top-2 right-2 w-4 h-4 text-[#d4af37]"></i>' : ''}
                        ${p.name}
                      </button>
                    `;
                  }).join('')}
                </div>
                <button onclick="confirmTeam()" ${state.selectedTeam.length !== reqPlayers ? 'disabled' : ''} class="w-full py-4 rounded-sm font-bold text-xl transition-all ${state.selectedTeam.length === reqPlayers ? 'gold-btn' : 'medieval-btn opacity-50 cursor-not-allowed'}">지목 완료 및 투표 진행</button>
              </div>
            `}
          </div>
        `;
      }
      else if (state.gameState === 'voting') {
        const player = state.players[state.currentPlayerIndex];
        content += `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-6 rounded-sm shadow-2xl text-center min-h-[500px] flex flex-col justify-center">
            <h2 class="text-3xl font-extrabold gold-text mb-3">여정대 투표</h2>
            <p class="text-[#bcaaa4] mb-8 font-medium">투표는 익명으로 수집되어 동시에 공개됩니다.</p>
            <div class="stone-slot p-5 rounded-sm mb-10">
              <span class="text-sm text-[#8d6e63] font-bold block mb-3 uppercase tracking-widest">지목된 인원 (${state.selectedTeam.length}명)</span>
              <div class="flex flex-wrap justify-center gap-3">
                ${state.selectedTeam.map(id => `
                  <span class="bg-[#3e2723] border border-[#5d4037] px-4 py-1.5 rounded-sm text-[#f5deb3] font-bold shadow-md">
                    ${state.players.find(p=>p.id === id).name}
                  </span>
                `).join('')}
              </div>
            </div>
            ${!state.showSecret ? `
              <div class="flex-1 flex flex-col justify-center">
                <h4 class="text-4xl font-extrabold text-[#f5deb3] mb-8 drop-shadow-md">${player.name}의 차례</h4>
                <button onclick="state.showSecret=true; setTimer(10); render();" class="w-full py-5 medieval-btn font-bold text-xl flex items-center justify-center gap-3">
                  <i data-lucide="scroll" class="w-6 h-6"></i> 투표권 확인 (10초)
                </button>
              </div>
            ` : `
              <div class="flex-1 flex flex-col justify-center animate-fadeIn">
                <h4 class="text-3xl font-bold text-[#f5deb3] mb-10">${player.name}의 선택</h4>
                <div class="flex gap-5">
                  <button onclick="handleVote('approve')" class="flex-1 py-10 royal-btn rounded-sm font-bold text-3xl flex flex-col items-center gap-4">
                    <i data-lucide="check-circle-2" class="w-12 h-12 text-[#82b1ff]"></i> 찬성
                  </button>
                  <button onclick="handleVote('reject')" class="flex-1 py-10 blood-btn rounded-sm font-bold text-3xl flex flex-col items-center gap-4">
                    <i data-lucide="x-circle" class="w-12 h-12 text-[#ff8a80]"></i> 반대
                  </button>
                </div>
              </div>
            `}
          </div>
        `;
      }
      else if (state.gameState === 'quest') {
        const questTeamMembers = state.selectedTeam.map(id => state.players.find(p => p.id === id));
        const player = questTeamMembers[state.currentPlayerIndex];
        const isEvil = player.team === 'evil';

        content += `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-6 rounded-sm shadow-2xl text-center min-h-[500px] flex flex-col justify-center">
            <h2 class="text-3xl font-extrabold gold-text mb-3">신앙여정 진행</h2>
            <p class="text-[#bcaaa4] mb-10 font-medium">여정을 떠난 인원들만 비밀리에 카드를 제출합니다.</p>
            ${!state.showSecret ? `
              <div class="flex-1 flex flex-col justify-center">
                <h4 class="text-4xl font-extrabold text-[#f5deb3] mb-8 drop-shadow-md">${player.name}의 차례</h4>
                <button onclick="state.showSecret=true; setTimer(10); render();" class="w-full py-5 gold-btn font-bold text-xl flex items-center justify-center gap-3">카드 선택하기 (10초)</button>
              </div>
            ` : `
              <div class="flex-1 flex flex-col justify-center animate-fadeIn">
                <div class="mb-8">
                  <h4 class="text-3xl font-bold text-[#f5deb3] mb-3">${player.name}의 선택</h4>
                  ${!isEvil ? `<p class="text-[#64b5f6] text-sm font-bold bg-[#0d47a1]/30 py-2 rounded-sm border border-[#1565c0]">선 진영은 '성공'만 낼 수 있습니다.</p>` : ''}
                </div>
                <div class="flex gap-5">
                  <button onclick="handleQuestCard('success')" class="flex-1 py-12 royal-btn rounded-sm font-bold text-3xl flex flex-col items-center gap-4">
                    <i data-lucide="shield" class="w-14 h-14 text-[#82b1ff]"></i> 성공
                  </button>
                  ${isEvil ? `
                    <button onclick="handleQuestCard('fail')" class="flex-1 py-12 blood-btn rounded-sm font-bold text-3xl flex flex-col items-center gap-4">
                      <i data-lucide="sword" class="w-14 h-14 text-[#ff8a80]"></i> 실패
                    </button>
                  ` : ''}
                </div>
              </div>
            `}
          </div>
        `;
      }
      else if (state.gameState === 'quest_result') {
        const latestResult = state.history[state.history.length - 1];
        const isFailed = latestResult.result === 'fail';
        const needsTwoFailsStr = (state.players.length >= 7 && latestResult.round === 3) ? '(이번 라운드는 2장 필요)' : '';

        content += `
          <div class="parchment-panel border-[6px] border-double border-[#8b6b4a] p-6 rounded-sm shadow-2xl text-center flex flex-col justify-center min-h-[500px]">
            <h2 class="text-4xl font-extrabold mb-4 gold-text">여정 결과 서신</h2>
            <h3 class="text-3xl font-extrabold mb-10 drop-shadow-md ${isFailed ? 'text-[#ff5252]' : 'text-[#64b5f6]'}">${isFailed ? '임무 실패!' : '임무 성공!'}</h3>
            <div class="flex justify-center gap-4 mb-10 flex-wrap">
              ${latestResult.cards.map((card, i) => `
                <div class="w-24 h-32 rounded-sm flex items-center justify-center shadow-[0_10px_20px_rgba(0,0,0,0.6)] border-2 animate-fadeIn ${card === 'success' ? 'bg-[linear-gradient(to_bottom,#1565c0,#0d47a1)] border-[#82b1ff] text-[#e3f2fd]' : 'bg-[linear-gradient(to_bottom,#990000,#5c0000)] border-[#ff8a80] text-[#ffebee]'}" style="animation-delay: ${i * 150}ms; animation-fill-mode: both;">
                  <i data-lucide="${card === 'success' ? 'shield' : 'sword'}" class="w-10 h-10"></i>
                </div>
              `).join('')}
            </div>
            <div class="stone-slot p-4 mb-10 mx-4">
              <p class="text-[#f5deb3] font-bold text-lg">실패 카드: <span class="text-[#ff5252] text-2xl mx-2">${latestResult.fails}</span> 장</p>
              ${needsTwoFailsStr ? `<p class="text-sm font-normal text-[#bcaaa4] mt-1">${needsTwoFailsStr}</p>` : ''}
            </div>
            <button onclick="proceedFromQuestResult()" class="w-full py-4 gold-btn font-bold text-xl">결과 확인 (다음 단계로)</button>
          </div>
        `;
      }
      else if (state.gameState === 'evil_discussion') {
        content += `
          <div class="bg-[linear-gradient(to_bottom_right,#3e1111,#1a0505)] border-[6px] border-double border-[#990000] p-8 rounded-sm shadow-2xl text-center flex flex-col justify-center min-h-[500px]">
            <i data-lucide="alert-triangle" class="w-20 h-20 text-[#ff5252] mx-auto mb-6 drop-shadow-[0_0_15px_rgba(255,82,82,0.6)]"></i>
            <h2 class="text-4xl font-extrabold text-[#ff8a80] mb-6">악 진영 모의 시간</h2>
            <p class="text-[#d7ccc8] text-lg mb-10 leading-relaxed font-medium">헤롯이 모세를 암살하기 전,<br/>악 진영끼리 소리 내어 (또는 눈치껏) 상의하세요.</p>
            <button onclick="state.gameState='assassination'; setTimer(20); render();" class="w-full py-4 blood-btn font-bold text-xl">모의 종료 (암살 대상 지목)</button>
          </div>
        `;
      }
      else if (state.gameState === 'assassination') {
        const herod = state.players.find(p => p.roleId === 'herod');
        
        content += `
          <div class="bg-[linear-gradient(to_bottom_right,#3e1111,#1a0505)] border-[6px] border-double border-[#990000] p-6 rounded-sm shadow-2xl text-center min-h-[500px] flex flex-col justify-center">
            <h2 class="text-4xl font-extrabold text-[#ff8a80] mb-3 drop-shadow-[0_2px_4px_rgba(0,0,0,1)]">마지막 위기!</h2>
            <p class="text-[#d7ccc8] mb-8 font-medium">선 진영이 3번의 여정을 성공했습니다. 하지만 악 진영에게 마지막 기회가 있습니다.</p>
            <div class="stone-slot p-5 rounded-sm mb-8 border-[#990000]">
              <h3 class="text-2xl font-bold text-[#f5deb3] mb-2">암살자 <span class="text-[#ff5252] font-extrabold drop-shadow-[0_0_8px_rgba(255,82,82,0.5)]">헤롯 (${herod.name})</span>의 턴</h3>
              <p class="text-[#bcaaa4] text-sm">모세 역할을 한 자를 정확히 찾아내면 역전승합니다.</p>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
              ${state.players.filter(p => p.team === 'good').map(p => `
                <button onclick="state.assassinationTarget=${p.id}; render();" class="p-4 rounded-sm text-xl font-bold transition-all ${state.assassinationTarget === p.id ? 'blood-btn scale-105 shadow-[0_0_20px_rgba(255,82,82,0.6)]' : 'medieval-btn opacity-90'}">
                  ${p.name}
                </button>
              `).join('')}
            </div>
            ${state.assassinationTarget !== null ? `
              <button onclick="handleAssassination(${state.assassinationTarget})" class="w-full py-5 bg-[linear-gradient(to_bottom,#990000,#5c0000)] hover:bg-[linear-gradient(to_bottom,#b71c1c,#7f0000)] border-2 border-[#ff5252] text-white rounded-sm font-bold text-2xl shadow-[0_10px_20px_rgba(0,0,0,0.8)] transition-all animate-fadeIn">
                [ ${state.players.find(p => p.id === state.assassinationTarget).name} ] 암살 확정
              </button>
            ` : ''}
          </div>
        `;
      }
      else if (state.gameState === 'end') {
        const isGoodWin = state.winner === 'good';
        content += `
          <div class="p-8 rounded-sm shadow-[0_20px_50px_rgba(0,0,0,0.9)] border-[8px] border-double text-center ${isGoodWin ? 'bg-[linear-gradient(to_bottom_right,#0b2347,#051024)] border-[#1565c0]' : 'bg-[linear-gradient(to_bottom_right,#3e1111,#1a0505)] border-[#b71c1c]'}">
            <i data-lucide="${isGoodWin ? 'shield' : 'sword'}" class="w-20 h-20 ${isGoodWin ? 'text-[#64b5f6] drop-shadow-[0_0_15px_rgba(100,181,246,0.6)]' : 'text-[#ff5252] drop-shadow-[0_0_15px_rgba(255,82,82,0.6)]'} mx-auto mb-6"></i>
            <h1 class="text-5xl font-extrabold mb-6 drop-shadow-[0_4px_6px_rgba(0,0,0,1)] ${isGoodWin ? 'text-[#82b1ff]' : 'text-[#ff8a80]'}">${isGoodWin ? '선 진영 승리!' : '악 진영 승리!'}</h1>
            <p class="text-xl text-[#f5deb3] mb-10 font-bold leading-relaxed bg-black/50 p-4 rounded-sm border border-[#4e342e] shadow-inner">${state.winReason}</p>
            
            <div class="stone-slot p-6 mb-10 text-left border-[#8b6b4a]">
              <h3 class="text-2xl font-bold gold-text mb-6 border-b-2 border-[#5d4037] pb-3 text-center uppercase">모든 역할 공개</h3>
              <div class="space-y-6">
                <div>
                  <h4 class="text-[#64b5f6] font-bold mb-3 text-lg">빛의 자녀들 (선 진영)</h4>
                  <div class="flex flex-wrap gap-3">
                    ${state.players.filter(p => p.team === 'good').map(p => `
                      <span class="bg-[#0d47a1]/40 px-4 py-2 rounded-sm text-[#e3f2fd] border border-[#1565c0] shadow-md">
                        <span class="font-bold text-lg">${p.name}</span> <span class="text-[#82b1ff] text-sm ml-2">(${p.characterName} / ${p.role})</span>
                      </span>
                    `).join('')}
                  </div>
                </div>
                <div>
                  <h4 class="text-[#ff8a80] font-bold mb-3 text-lg">어둠의 권세 (악 진영)</h4>
                  <div class="flex flex-wrap gap-3">
                    ${state.players.filter(p => p.team === 'evil').map(p => `
                      <span class="bg-[#7f0000]/40 px-4 py-2 rounded-sm text-[#ffebee] border border-[#b71c1c] shadow-md">
                        <span class="font-bold text-lg">${p.name}</span> <span class="text-[#ff8a80] text-sm ml-2">(${p.characterName} / ${p.role})</span>
                      </span>
                    `).join('')}
                  </div>
                </div>
              </div>
            </div>
            <button onclick="resetGame()" class="w-full py-5 gold-btn font-bold text-2xl uppercase tracking-widest">새 게임 시작</button>
          </div>
        `;
      }

      app.innerHTML = content;
      lucide.createIcons(); // 아이콘 렌더링
      
      // 참가자 추가 화면일 때 입력창에 자동 포커스
      if (state.gameState === 'setup') {
        const nameInput = document.getElementById('playerNameInput');
        if (nameInput) nameInput.focus();
      }
    }

    // 초기 렌더링
    render();
  </script>
</body>
</html>
